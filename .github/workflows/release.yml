name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/maneo-${TAG}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Maneo ${{ github.ref_name }}"
          body: |
            ## Maneo ${{ github.ref_name }}

            Download the APK below and install it on your Android device (API 26+).

            > Enable **Install unknown apps** for your file manager or browser if prompted.
          files: app/build/outputs/apk/release/maneo-${{ github.ref_name }}.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
